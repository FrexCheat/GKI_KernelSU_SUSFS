# ========================================
# GKI 内核构建主入口
# ========================================
# 此工作流是项目的统一入口点，用于：
# 1. 构建所有版本的 GKI 内核
# 2. 获取最新的 KSU 管理器
# 3. 收集补丁冲突文件用于调试
# 4. 创建 GitHub Release (可选)
# ========================================

name: 1 - Build Trigger

# 适配 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 并发控制：同一分支只运行一个实例，新运行会取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== 发布配置 ====================
      release_type:
        description: "发布类型"
        type: choice
        options:
          - Actions
        default: Actions

      # ==================== KernelSU 配置 ====================
      # KernelSU 变体固定为 ReSukiSU
      kernelsu_branch:
        description: "KSU 分支 (main/builtin/自定义commit hash，留空使用默认)"
        type: string
        default: ""
        required: false

      # ==================== 可选配置 ====================
      version:
        description: "自定义版本名 (可选)"
        type: string
        default: "5.10.x-android12-9-00047-g4968e29b7f92-ab12786767"
        required: false
      build_time:
        description: "自定义构建时间 (可选，留空=当前UTC)"
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
        required: false

      # ==================== 功能开关 ====================
      use_zram:
        description: "启用 ZRAM 增强算法"
        type: boolean
        default: false
      use_bbg:
        description: "启用 BBG 防格机"
        type: boolean
        default: false
      use_kpm:
        description: "启用 KPM 功能"
        type: boolean
        default: false
      use_rekernel:
        description: "启用 Re-Kernel 驱动"
        type: boolean
        default: false
      cancel_susfs:
        description: "禁用 SUSFS"
        type: boolean
        default: false

      # ==================== 构建版本选择 ====================
      build_a12_5_10:
        description: "Android 12 - 5.10"
        type: boolean
        default: true
      build_a13_5_15:
        description: "Android 13 - 5.15"
        type: boolean
        default: false
      build_a14_6_1:
        description: "Android 14 - 6.1"
        type: boolean
        default: false
      build_a15_6_6:
        description: "Android 15 - 6.6"
        type: boolean
        default: false
      build_a16_6_12:
        description: "Android 16 - 6.12"
        type: boolean
        default: false
      build_all:
        description: "构建全部版本"
        type: boolean
        default: false

      # ==================== Bot-Push 选项 ====================
      commit:
        description: "Commit (sha 或描述)"
        type: string
        default: ""
        required: false
      change_log:
        description: "Change Log (可选，支持多行)"
        type: string
        default: ""
        required: false

jobs:
  # ==================== 获取管理器 ====================
  # 下载最新的 KernelSU 管理器 APK 和 SUSFS 模块
  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit

  # ==================== Android 12 - 5.10 构建 ====================
  build-a12-5-10:
    if: inputs.build_a12_5_10 || inputs.build_all
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Android 13 - 5.15 构建 ====================
  build-a13-5-15:
    if: inputs.build_a13_5_15 || inputs.build_all
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Android 14 - 6.1 构建 ====================
  build-a14-6-1:
    if: inputs.build_a14_6_1 || inputs.build_all
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Android 15 - 6.6 构建 ====================
  build-a15-6-6:
    if: inputs.build_a15_6_6 || inputs.build_all
    uses: ./.github/workflows/kernel-a15-6-6.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== Android 16 - 6.12 构建 ====================
  build-a16-6-12:
    if: inputs.build_a16_6_12 || inputs.build_all
    uses: ./.github/workflows/kernel-a16-6-12.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      called_from_main: true

  # ==================== 收集补丁冲突文件 ====================
  # 汇总所有构建任务中的 .rej 文件，方便调试补丁问题
  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12
    steps:
      - name: 下载冲突文件
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: 处理冲突文件
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: 上传汇总冲突文件
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore
